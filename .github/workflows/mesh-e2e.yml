name: Mesh Replication E2E

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Backend image tag to test'
        type: string
        default: 'dev'
      skip_deploy:
        description: 'Skip ArgoCD sync (use existing cluster state)'
        type: boolean
        default: false

  workflow_call:
    inputs:
      image_tag:
        type: string
        default: 'dev'

permissions:
  contents: read

concurrency:
  group: mesh-e2e
  cancel-in-progress: false

jobs:
  mesh-e2e:
    name: Mesh Replication E2E
    runs-on: ak-e2e-runners
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Sync mesh applications
        if: ${{ !inputs.skip_deploy }}
        run: |
          TAG="${{ inputs.image_tag || 'dev' }}"

          for app in ak-mesh-main ak-mesh-peer-1 ak-mesh-peer-2 ak-mesh-peer-3; do
            echo "Setting image tag $TAG on $app..."

            # Update backend.image.tag in the Application's Helm parameters
            # using JSON patch to preserve all other ApplicationSet-managed parameters.
            # A merge patch would replace the entire parameters array, wiping out
            # fullnameOverride, PEER_* env vars, and jwtSecret.
            PARAM_INDEX=$(kubectl -n argocd get application "$app" \
              -o jsonpath='{range .spec.source.helm.parameters[*]}{.name}{"\n"}{end}' 2>/dev/null | \
              grep -n "^backend.image.tag$" | cut -d: -f1 || true)

            if [ -n "$PARAM_INDEX" ]; then
              # Update existing parameter (convert to 0-indexed)
              IDX=$((PARAM_INDEX - 1))
              echo "  Updating existing backend.image.tag at index $IDX"
              kubectl -n argocd patch application "$app" --type json \
                -p "[{\"op\":\"replace\",\"path\":\"/spec/source/helm/parameters/$IDX/value\",\"value\":\"$TAG\"}]"
            else
              # Add new parameter to the end of the array
              echo "  Adding backend.image.tag parameter"
              kubectl -n argocd patch application "$app" --type json \
                -p "[{\"op\":\"add\",\"path\":\"/spec/source/helm/parameters/-\",\"value\":{\"name\":\"backend.image.tag\",\"value\":\"$TAG\"}}]"
            fi

            # Trigger a hard refresh so ArgoCD re-renders manifests with the new tag
            kubectl -n argocd annotate application "$app" \
              argocd.argoproj.io/refresh=hard --overwrite

            echo "Waiting for $app to sync..."
            # Allow up to 10 minutes: first deploy includes DB init + image pulls
            for i in $(seq 1 120); do
              SYNC_STATUS=$(kubectl -n argocd get application "$app" \
                -o jsonpath='{.status.sync.status}' 2>/dev/null)
              HEALTH_STATUS=$(kubectl -n argocd get application "$app" \
                -o jsonpath='{.status.health.status}' 2>/dev/null)
              if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
                echo "$app is Synced and Healthy"
                break
              fi
              echo "  $app: sync=$SYNC_STATUS health=$HEALTH_STATUS (attempt $i/120)"
              sleep 5
            done

            if [ "$SYNC_STATUS" != "Synced" ] || [ "$HEALTH_STATUS" != "Healthy" ]; then
              echo "::warning::$app did not reach Synced/Healthy within timeout (sync=$SYNC_STATUS health=$HEALTH_STATUS)"
            fi
          done

      - name: Wait for healthy
        run: |
          for app in ak-mesh-main ak-mesh-peer-1 ak-mesh-peer-2 ak-mesh-peer-3; do
            echo "Waiting for $app to be healthy..."
            for i in $(seq 1 120); do
              HEALTH=$(kubectl -n argocd get application "$app" \
                -o jsonpath='{.status.health.status}' 2>/dev/null)
              if [ "$HEALTH" = "Healthy" ]; then
                echo "$app is Healthy"
                break
              fi
              echo "  $app: health=$HEALTH (attempt $i/120)"
              sleep 5
            done

            if [ "$HEALTH" != "Healthy" ]; then
              echo "::error::$app is not healthy after 10 minutes (health=$HEALTH)"
              # Dump diagnostics before failing
              echo "--- Pod status for $app ---"
              NS=$(kubectl -n argocd get application "$app" -o jsonpath='{.spec.destination.namespace}' 2>/dev/null || true)
              if [ -n "$NS" ]; then
                kubectl get pods -n "$NS" 2>/dev/null || true
                kubectl describe pods -n "$NS" --field-selector=status.phase!=Running 2>/dev/null | head -50 || true
              fi
              exit 1
            fi
          done

      - name: Checkout IaC repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: artifact-keeper/artifact-keeper-iac
          path: iac
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run E2E test Job
        run: |
          # Clean up any previous run
          kubectl delete job mesh-e2e-test -n ak-mesh-main --ignore-not-found

          # Apply test resources
          kubectl apply -f iac/e2e/mesh/rbac.yaml
          kubectl apply -f iac/e2e/mesh/configmap-test-script.yaml
          kubectl apply -f iac/e2e/mesh/job.yaml

          # Wait for Job completion (10 min timeout)
          echo "Waiting for mesh E2E test Job to complete..."
          kubectl wait --for=condition=complete job/mesh-e2e-test \
            -n ak-mesh-main \
            --timeout=600s || {
            echo "::error::Mesh E2E test Job failed or timed out"
            kubectl logs job/mesh-e2e-test -n ak-mesh-main 2>/dev/null || true
            exit 1
          }

      - name: Collect results
        if: always()
        run: |
          echo "## Mesh Replication E2E Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl logs job/mesh-e2e-test -n ak-mesh-main 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No logs available"
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Cleanup test Job
        if: always()
        run: |
          kubectl delete job mesh-e2e-test -n ak-mesh-main --ignore-not-found
